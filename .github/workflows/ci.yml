name: Perfect Nails CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main", "dev"]

jobs:
  build:
    name: Typecheck, Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Typecheck
        run: npm run typecheck

      - name: Run Linter
        run: npm run lint

      - name: Test Build (Isolated Sandbox)
        # We skip prisma migrate deploy here by overwriting the build script inline or just running next build directly.
        # This prevents the CI server from needing a DATABASE_URL to succeed the build check.
        run: npx next build
